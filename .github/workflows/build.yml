name: Build Packages
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed.outputs.packages }}
      has-packages: ${{ steps.changed.outputs.has-packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            if [ -z "$base" ] || [ -z "$head" ]; then
              echo "Unable to determine diff range for ${{ github.event_name }}" >&2
              exit 1
            fi
            changed_files=$(git diff --name-only "$base" "$head")
          else
            head="${{ github.sha }}"
            if [ -z "$head" ]; then
              echo "Unable to determine commit for ${{ github.event_name }}" >&2
              exit 1
            fi
            changed_files=$(git diff --name-only "$head^" "$head")
          fi

          # Find changed package directories
          packages="[]"
          for dir in packages/*/; do
            pkg=$(basename "$dir")
            if echo "$changed_files" | grep -q "^packages/${pkg}/"; then
              packages=$(echo "$packages" | jq -c --arg pkg "$pkg" '. + [$pkg]')
            fi
          done

          # Also check for changed single-file packages
          for f in packages/*.nix; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            if echo "$changed_files" | grep -q "^packages/${fname}$"; then
              pkg="${fname%.nix}"
              packages=$(echo "$packages" | jq -c --arg pkg "$pkg" '. + [$pkg]')
            fi
          done

          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          if [ "$packages" = "[]" ]; then
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }} -L

      - name: Push to cache
        if: success()
        run: |
          nix build .#${{ matrix.package }} --no-link --print-out-paths | cachix push ${{ vars.CACHIX_CACHE_NAME }}
